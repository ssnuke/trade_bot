trading:
  starting_capital: 5000.0
  target_equity: 80000.0
  base_leverage: 25
  max_daily_loss_pct: 0.20
  max_concurrent_positions: 1
  swing_lookback: 20
  volume_mult: 1.5
  min_breakout_pct: 0.005

risk:
  base_risk_pct: 0.15
  max_risk_pct: 0.25
  consecutive_loss_limit: 3
  min_win_streak_for_increase: 2
  ema_cross_risk_pct: 0.10
  ema_cross_max_risk_pct: 0.15

api:
  base_url: "https://api.india.delta.exchange"
  timeout: 15
  max_retries: 3

session:
  timezone: "IST"
  utc_offset_hours: 5
  utc_offset_minutes: 30

symbols:
  priority:
    - "ETHUSD"
    - "SOLUSD"
    - "XRPUSD"
    - "BNBUSD"
    - "UNIUSD"
    - "LTCUSD"
    - "DOGEUSD"
    - "LINKUSD"
    - "AVAXUSD"
    - "DOTUSD"
    - "ADAUSD"
    - "ATOMUSD"
    - "ALGOUSD"
    - "BCHUSD"

app:
  paper_trading: true
  turbo_mode: true
  sure_shot_only: true
  log_dir: "paper_trades"
  dashboard_file: "dashboard_data.json"
